<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Terminal — Dynamic Workers</title>
  <style>
    :root {
      --bg: #0a0e17;
      --panel: #111827;
      --border: #1e293b;
      --green: #22c55e;
      --red: #ef4444;
      --cyan: #06b6d4;
      --amber: #f59e0b;
      --dim: #64748b;
      --text: #e2e8f0;
      --bright: #f8fafc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      border: 1px solid var(--border);
      background: var(--panel);
      padding: 16px 20px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 16px;
      color: var(--cyan);
      font-weight: 600;
    }

    .header h1 span { color: var(--dim); font-weight: 400; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.disconnected { background: var(--red); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--dim);
    }

    /* Price table */
    .price-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .price-table th {
      text-align: left;
      padding: 10px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--dim);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }

    .price-table td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
    }

    .price-table tr:hover { background: rgba(6, 182, 212, 0.05); }

    .price-table tr.flash-green { animation: flashGreen 0.6s ease-out; }
    .price-table tr.flash-red { animation: flashRed 0.6s ease-out; }

    @keyframes flashGreen {
      0% { background: rgba(34, 197, 94, 0.2); }
      100% { background: transparent; }
    }
    @keyframes flashRed {
      0% { background: rgba(239, 68, 68, 0.2); }
      100% { background: transparent; }
    }

    .coin-symbol {
      color: var(--bright);
      font-weight: 600;
    }

    .coin-name { color: var(--dim); font-size: 12px; }

    .positive { color: var(--green); }
    .negative { color: var(--red); }

    .analyze-btn {
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      padding: 4px 10px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .analyze-btn:hover {
      background: var(--cyan);
      color: var(--bg);
    }

    .analyze-btn:disabled {
      border-color: var(--dim);
      color: var(--dim);
      cursor: not-allowed;
    }

    .analyze-btn:disabled:hover { background: transparent; }

    /* Terminal log panel */
    .terminal-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 0;
    }

    .terminal-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .terminal-header span {
      font-size: 12px;
      color: var(--amber);
      font-weight: 600;
    }

    .clear-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }

    .clear-btn:hover { color: var(--text); }

    .terminal-log {
      padding: 12px 16px;
      height: 260px;
      overflow-y: auto;
      font-size: 12px;
    }

    .terminal-log::-webkit-scrollbar { width: 6px; }
    .terminal-log::-webkit-scrollbar-track { background: var(--panel); }
    .terminal-log::-webkit-scrollbar-thumb { background: var(--border); }

    .log-line { padding: 2px 0; }

    .log-line .ts { color: var(--dim); }
    .log-line .tag { font-weight: 600; }
    .log-line .tag.sys { color: var(--cyan); }
    .log-line .tag.price { color: var(--green); }
    .log-line .tag.agent { color: var(--amber); }
    .log-line .tag.err { color: var(--red); }

    /* Footer */
    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: var(--dim);
    }

    .footer a { color: var(--cyan); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    /* Loading state */
    .loading-row td { text-align: center; color: var(--dim); padding: 40px; }

    @media (max-width: 768px) {
      .container { padding: 10px; }
      .price-table th:nth-child(4),
      .price-table td:nth-child(4),
      .price-table th:nth-child(5),
      .price-table td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>CRYPTO TERMINAL <span>// Dynamic Workers</span></h1>
      <div class="header-right">
        <span><span class="status-dot" id="statusDot"></span><span id="statusText">connecting...</span></span>
        <span id="updateTime">--</span>
      </div>
    </div>

    <!-- Price Table -->
    <table class="price-table">
      <thead>
        <tr>
          <th>Coin</th>
          <th>Price (USD)</th>
          <th>24h Change</th>
          <th>Market Cap</th>
          <th>Volume (24h)</th>
          <th>Analyze</th>
        </tr>
      </thead>
      <tbody id="priceBody">
        <tr class="loading-row">
          <td colspan="6">Connecting to price feed...</td>
        </tr>
      </tbody>
    </table>

    <!-- Terminal Log -->
    <div class="terminal-panel">
      <div class="terminal-header">
        <span>AGENT LOG</span>
        <button class="clear-btn" onclick="clearLog()">[ clear ]</button>
      </div>
      <div class="terminal-log" id="termLog"></div>
    </div>

    <div class="footer">
      Powered by <a href="https://github.com/papismurf/dynamic-workers">Dynamic Workers Agent Orchestrator</a>
      &mdash; prices via CoinGecko
    </div>
  </div>

  <script>
    const priceBody = document.getElementById('priceBody');
    const termLog = document.getElementById('termLog');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const updateTime = document.getElementById('updateTime');

    let previousPrices = {};
    let ws = null;
    let reconnectTimer = null;

    // -- Logging ----------------------------------------------------------

    function log(tag, tagClass, msg) {
      const ts = new Date().toLocaleTimeString('en-US', { hour12: false });
      const line = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML = `<span class="ts">${ts}</span> <span class="tag ${tagClass}">[${tag}]</span> ${escapeHtml(msg)}`;
      termLog.appendChild(line);
      termLog.scrollTop = termLog.scrollHeight;
    }

    function clearLog() { termLog.innerHTML = ''; }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // -- Formatting -------------------------------------------------------

    function fmt(n, decimals = 2) {
      if (n == null) return '--';
      return n.toLocaleString('en-US', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals,
      });
    }

    function fmtCompact(n) {
      if (n == null) return '--';
      if (n >= 1e12) return '$' + (n / 1e12).toFixed(2) + 'T';
      if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
      if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
      return '$' + fmt(n);
    }

    // -- Price table update -----------------------------------------------

    function renderPrices(coins) {
      priceBody.innerHTML = '';

      coins.forEach(c => {
        const prev = previousPrices[c.id];
        const changeClass = (c.change_24h ?? 0) >= 0 ? 'positive' : 'negative';
        const changeSign = (c.change_24h ?? 0) >= 0 ? '+' : '';
        let flashClass = '';
        if (prev != null && prev !== c.price_usd) {
          flashClass = c.price_usd > prev ? 'flash-green' : 'flash-red';
        }

        const tr = document.createElement('tr');
        tr.id = `row-${c.id}`;
        if (flashClass) tr.className = flashClass;

        tr.innerHTML = `
          <td><span class="coin-symbol">${c.symbol}</span> <span class="coin-name">${c.name}</span></td>
          <td>$${fmt(c.price_usd, c.price_usd < 1 ? 6 : 2)}</td>
          <td class="${changeClass}">${changeSign}${fmt(c.change_24h)}%</td>
          <td>${fmtCompact(c.market_cap)}</td>
          <td>${fmtCompact(c.volume_24h)}</td>
          <td><button class="analyze-btn" onclick="analyze('${c.id}')">analyze</button></td>
        `;
        priceBody.appendChild(tr);

        previousPrices[c.id] = c.price_usd;
      });
    }

    // -- WebSocket --------------------------------------------------------

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws/prices`);

      ws.onopen = () => {
        statusDot.classList.remove('disconnected');
        statusText.textContent = 'live';
        log('sys', 'sys', 'Connected to price feed');
      };

      ws.onmessage = (e) => {
        const tick = JSON.parse(e.data);
        renderPrices(tick.coins);
        updateTime.textContent = new Date(tick.timestamp * 1000).toLocaleTimeString('en-US', { hour12: false });
      };

      ws.onclose = () => {
        statusDot.classList.add('disconnected');
        statusText.textContent = 'disconnected';
        log('sys', 'err', 'Price feed disconnected — reconnecting in 5s...');
        reconnectTimer = setTimeout(connect, 5000);
      };

      ws.onerror = () => {
        ws.close();
      };
    }

    // -- Analysis via orchestrator ----------------------------------------

    async function analyze(coinId) {
      const btn = document.querySelector(`#row-${coinId} .analyze-btn`);
      if (btn) { btn.disabled = true; btn.textContent = '...'; }

      log('agent', 'agent', `Submitting ${coinId} analysis to orchestrator...`);

      try {
        const resp = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ coin_id: coinId, analysis_type: 'summary' }),
        });

        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.detail || resp.statusText);
        }

        const { task_id } = await resp.json();
        log('agent', 'agent', `Task created: ${task_id}`);
        log('agent', 'sys', 'Orchestrator is provisioning Dynamic Workers...');

        pollTask(coinId, task_id, btn);
      } catch (err) {
        log('agent', 'err', `Analysis failed: ${err.message}`);
        if (btn) { btn.disabled = false; btn.textContent = 'analyze'; }
      }
    }

    async function pollTask(coinId, taskId, btn) {
      const maxPolls = 60;
      for (let i = 0; i < maxPolls; i++) {
        await new Promise(r => setTimeout(r, 3000));

        try {
          const resp = await fetch(`/api/tasks/${taskId}`);
          const task = await resp.json();

          if (task.status === 'completed' || task.status === 'review') {
            log('agent', 'agent', `[${coinId}] Analysis complete`);
            if (task.summary) {
              task.summary.split('\n').forEach(line => {
                if (line.trim()) log('agent', 'agent', `  ${line.trim()}`);
              });
            }
            if (task.cost_usd != null) {
              log('agent', 'sys', `  Cost: $${task.cost_usd.toFixed(4)}`);
            }
            if (btn) { btn.disabled = false; btn.textContent = 'analyze'; }
            return;
          }

          if (task.status === 'failed') {
            log('agent', 'err', `[${coinId}] Analysis failed: ${task.error || 'unknown'}`);
            if (btn) { btn.disabled = false; btn.textContent = 'analyze'; }
            return;
          }

          if (i % 5 === 0) {
            log('agent', 'sys', `[${coinId}] Status: ${task.status}...`);
          }
        } catch {
          // ignore poll errors, keep trying
        }
      }

      log('agent', 'err', `[${coinId}] Analysis timed out`);
      if (btn) { btn.disabled = false; btn.textContent = 'analyze'; }
    }

    // -- Init -------------------------------------------------------------
    log('sys', 'sys', 'Crypto Terminal v0.1.0');
    log('sys', 'sys', 'Connecting to Dynamic Workers orchestrator...');
    connect();
  </script>
</body>
</html>
